version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}
      - SHEET_EMPLOYEE_MASTER=${SHEET_EMPLOYEE_MASTER:-EMPLOYEE_MASTER}
      - SHEET_DOCUMENT_STATUS=${SHEET_DOCUMENT_STATUS:-DOCUMENT_STATUS}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_CLIENT_REFRESH_TOKEN=${GMAIL_CLIENT_REFRESH_TOKEN}
      - GMAIL_SENDER_ADDRESS=${GMAIL_SENDER_ADDRESS}
      - HR_EMAIL_RECIPIENTS=${HR_EMAIL_RECIPIENTS}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    restart: unless-stopped
    tmpfs:
      - /tmp/hr-sessions:size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./public/templates:/app/public/templates:ro
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done'"
    restart: unless-stopped

volumes:
  certbot-etc:
  certbot-var:

networks:
  default:
    name: hr-documents-net
