version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    restart: unless-stopped
    tmpfs:
      - /tmp/hr-sessions:size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    read_only: false
    volumes:
      # Mount PDF templates (update these with actual documents before deploying)
      - ./public/templates:/app/public/templates:ro

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:3000
    restart: unless-stopped
    depends_on:
      - app

networks:
  default:
    name: hr-documents-net
